name: "Terraform Infrastructure Deployment"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    name: "Sequential Terraform Apply"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Configure AWS Credentials (OIDC via GitHub Variables)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.S3_BUCKET_NAME }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.DYNAMODB_TABLE_NAME }}" \
            -reconfigure

      - name: Terraform Validate
        run: terraform validate

      # =======================================================================
      # STEP 1: Dependencies Base Setup (providers.tf, variables.tf, security_groups.tf, user.tf)
      # =======================================================================
      - name: Terraform Apply (Step 1 - Security Groups & IAM Users)
        run: |
          echo "Deploying Security Groups and IAM configurations first..."
          terraform apply -target=aws_security_group.eks_cluster_sg -target=aws_security_group.eks_nodes_sg -target=aws_iam_role.eks_master_role -target=aws_iam_role.eks_node_role -auto-approve || true
          terraform apply -target=aws_iam_user.allowed_users -auto-approve || true
        # Note: Agar aapke resources ke names alag hain, toh Terraform bacha hua kaam automatically target kar lega.

      # =======================================================================
      # STEP 2: Core EKS Cluster & Node Groups Setup (eks.tf)
      # =======================================================================
      - name: Terraform Apply (Step 2 - Core EKS Cluster)
        run: |
          echo "Deploying Core EKS Cluster and Node Groups..."
          terraform apply -target=aws_eks_cluster.staging_cluster -target=aws_eks_node_group.general -auto-approve || true

      # =======================================================================
      # STEP 3: Addons & Catch-all (addons.tf and anything left)
      # =======================================================================
      - name: Terraform Apply (Step 3 - EKS Addons & Final Sync)
        run: |
          echo "Deploying EKS Add-ons and verifying remaining infrastructure..."
          terraform apply -auto-approve
