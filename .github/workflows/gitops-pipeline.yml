name: EKS Cluster Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  DYNAMODB_TABLE: ${{ vars.DYNAMODB_TABLE }}
  TF_VAR_region: ${{ vars.AWS_REGION }}

permissions:
  id-token: write      # OIDC ke liye zaroori
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ───────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─── OIDC se AWS Login ──────────────────────────────────
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActionsSession

      # ─── Terraform Setup ────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # ─── Terraform Init ─────────────────────────────────────
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.S3_BUCKET }}" \
            -backend-config="key=eks/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      # ─── Terraform Plan ─────────────────────────────────────
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # ══════════════════════════════════════════════════════════
      #  APPLY JOB
      # ══════════════════════════════════════════════════════════
      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      # ══════════════════════════════════════════════════════════
      #  DESTROY JOB — Pehle K8s cleanup, phir destroy
      # ══════════════════════════════════════════════════════════
      - name: Update Kubeconfig
        if: github.event.inputs.action == 'destroy'
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Cleanup K8s Resources (Services & PVCs)
        if: github.event.inputs.action == 'destroy'
        run: |
          # Load Balancers delete karo (warna VPC stuck hoga)
          kubectl delete svc --all -A --ignore-not-found=true

          # PersistentVolumeClaims delete karo
          kubectl delete pvc --all -A --ignore-not-found=true

          # Thoda wait karo AWS ko LB delete karne ka waqt do
          echo "Waiting 30s for AWS to delete Load Balancers..."
          sleep 30

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
