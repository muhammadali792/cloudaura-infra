name: "Cloudaura GitOps Infrastructure Pipeline"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: "Terraform Run"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # FIX: Bilkul sahi production action ka naam 'azure/setup-kubectl' hai
      - name: Setup Kubectl CLI
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=staging/eks-cluster/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Terraform Format Check
        run: terraform fmt -check

      # Kubeconfig update step jo Terraform chalne se pehle context set karega
      - name: Configure Kubeconfig for Kubernetes/Helm Providers
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name cloudaura-eks-cluster || echo "Cluster doesn't exist yet, proceeding..."

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
      - name: Get Admin Secret Key
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform output -raw admin_user_secret_key
      - name: Terraform Destroy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform destroy -auto-approve -input=false    
