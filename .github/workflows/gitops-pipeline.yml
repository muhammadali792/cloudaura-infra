name: EKS Cluster Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  DYNAMODB_TABLE: ${{ vars.DYNAMODB_TABLE }}
  TF_VAR_region: ${{ vars.AWS_REGION }}

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActionsSession

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # Backend config file banao — empty block issue fix
      - name: Create Backend Config File
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ vars.S3_BUCKET }}"
          key            = "eks/terraform.tfstate"
          region         = "${{ vars.AWS_REGION }}"
          dynamodb_table = "${{ vars.DYNAMODB_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # ── APPLY ──────────────────────────────────────────────
      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      # ── DESTROY ────────────────────────────────────────────
      - name: Update Kubeconfig
        if: github.event.inputs.action == 'destroy'
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Cleanup K8s Resources
        if: github.event.inputs.action == 'destroy'
        run: |
          kubectl delete svc --all -A --ignore-not-found=true
          kubectl delete pvc --all -A --ignore-not-found=true
          echo "Waiting 30s for AWS to delete Load Balancers..."
          sleep 30

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
