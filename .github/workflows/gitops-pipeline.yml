name: "Terraform Infrastructure Deployment"
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  terraform-apply:
    name: "Sequential Terraform Apply"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -reconfigure
        env:
          TF_CLI_ARGS_init: >-
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"
            -backend-config="key=staging/terraform.tfstate"
            -backend-config="region=${{ vars.AWS_REGION }}"
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        run: terraform validate
        
      - name: Terraform Apply
        run: |
          echo "Deploying complete infrastructure..."
          terraform apply -auto-approve 2>&1 | tee apply.log
          exit ${PIPESTATUS[0]}
      - name: Terraform Destroy
        run: |
          echo "Destroying complete infrastructure..."
          terraform destroy -auto-approve
