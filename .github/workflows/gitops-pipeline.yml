name: "Jhatpat AWS Cleanup Pipeline"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  aws-cleanup:
    name: "Fast AWS Infrastructure Destroy"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Trigger 2-Minute Fast Delete
        run: |
          echo "=== STEP 1: Deleting EKS Node Group ==="
          # Node group ko delete karne ka order (bina wait kiye)
          aws eks delete-nodegroup --cluster-name cloudaura-eks-cluster --nodegroup-name general || true
          
          echo "=== STEP 2: Deleting EKS Cluster ==="
          # Cluster ko delete karne ka order (bina wait kiye)
          aws eks delete-cluster --cluster-name cloudaura-eks-cluster || true

          echo "=== STEP 3: Finding and Deleting NAT Gateway ==="
          # NAT Gateway ko dhoond kar delete karna taake billing ruk jaye
          NAT_GW_ID=$(aws ec2 describe-nat-gateways \
            --filter "Name=tag:Environment,Values=staging" \
            --query "NatGateways[0].NatGatewayId" --output text)

          if [ "$NAT_GW_ID" != "None" ] && [ -not -z "$NAT_GW_ID" ]; then
            echo "Found NAT Gateway: $NAT_GW_ID. Deleting now..."
            aws ec2 delete-nat-gateway --nat-gateway-id $NAT_GW_ID || true
          else
            echo "No active NAT Gateway found with Environment=staging tag."
          fi

          echo "=== STEP 4: Success ==="
          echo "AWS ko deletion ka order bhej diya gaya hai. Pipeline safely exit kar rahi hai!"
